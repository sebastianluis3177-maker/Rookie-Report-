</head>
<body data-root=".">
<div class="progress-bar" id="progressBar"></div>
<header class="site-header">
  <div class="container navbar">
    <a href="index.html" class="logo"><span class="mark"></span>ROOKIE<b>REPORT</b></a>
    <nav class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="nba.html">NBA</a>
      <a href="wnba.html">WNBA</a>
      <a href="#">NFL <span class="soon">SOON</span></a>
      <a href="soccer.html">Soccer</a>
      <a href="trade-tracker.html">Trade Tracker</a>
      <a href="free-agency.html">Free Agency</a>
      <a href="rankings.html">Rankings</a>
      <a href="opinions.html" class="active">Opinions</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
    <div class="nav-actions">
      <button class="icon-btn" aria-label="Search" onclick="openSearch()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
      </button>
      <button class="icon-btn" aria-label="Toggle dark mode" data-theme-toggle onclick="toggleTheme()"></button>
      <button class="icon-btn nav-toggle" aria-label="Menu" onclick="toggleNav()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
    </div>
  </div>
</header>
<div class="search-panel" id="searchPanel">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search articles..." autocomplete="off">
    <div class="search-results" id="searchResults"></div>
    <p class="search-hint">Press Esc to close · ⌘K to open</p>
  </div>
</div>

<main>
  <div class="container page-header">
    <span class="eyebrow">Staff Opinion</span>
    <h1>Opinions</h1>
    <p>Takes, arguments, and predictions from the Rookie Report staff.</p>
  </div>

  <div class="container" style="padding-top:8px;">
    <div class="grid grid-4" id="catGrid"></div>
  </div>
</main>

<footer class="site-footer">
  <div class="container">
    <div class="footer-bottom">
      <span>© 2026 Rookie Report. All rights reserved.</span>
      <span><a href="index.html">Back to Home</a> · <a href="/admin/">Editor Login</a></span>
    </div>
  </div>
</footer>

<button class="back-to-top" id="backToTop" onclick="scrollToTop()" aria-label="Back to top">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
</button>
<script src="js/main.js"></script>
<script>
loadArticles().then(list=>{
  const items = list.filter(a=>a.categorySlug==='opinions');
  const grid = document.getElementById('catGrid');
  const source = items.length ? items : list;
  grid.innerHTML = source.map(a=>`
    <a href="${a.url}" class="card fade-in">
      <div class="thumb"><span class="slash-tag ${categoryClass(a.categorySlug)}">${a.category}</span><img src="${a.image}" alt="${a.title}" loading="lazy"></div>
      <div class="body"><h3>${a.title}</h3><p>${a.excerpt}</p>
        <div class="meta"><span class="author">${a.author}</span><span>${a.readTime}</span></div>
      </div>
    </a>`).join('');
  initFadeIns();
});
</script>
</body>
</html>
